apiVersion: v1
kind: Namespace
metadata:
  name: clahanstore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: clahanstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: clahanstore
spec:
  selector:
    app: mongodb  
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017